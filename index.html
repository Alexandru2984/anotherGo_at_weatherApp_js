<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vremea</title>

    <!-- PWA -->
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#212121" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Font Awesome for icons -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />

    <!-- Tema aleatorie (CSS variabile) -->
    <script>
    (function () {
      const styles = [
        'styles/styles.css',
        'styles/styles_v1.css',
        'styles/styles_v2.css',
        'styles/styles_v3.css',
        'styles/styles_v4.css'
      ];
      const randomStyle = styles[Math.floor(Math.random() * styles.length)];
      const link = document.createElement('link');
      link.rel = 'stylesheet';
      link.href = randomStyle;
      document.head.appendChild(link);
    })();
  </script>

    <!-- Stiluri comune pentru componente noi (se încarcă după tema aleatorie) -->
    <link rel="stylesheet" href="styles/styles_shared.css" />

    <script type="module" src="scripts/app.js" defer></script>
  </head>
  <body>
    <div class="container">
      <main>
        <!-- Search Section -->
        <section class="search-section">
          <div class="top-bar">
            <button
              id="get-location"
              class="btn btn-round"
              title="Folosiți locația curentă"
              data-i18n-title="useCurrentLocation"
            >
              <i class="fas fa-location-arrow"></i>
              <span data-i18n="currentLocation">Locația Curentă</span>
            </button>

            <div class="unit-toggle">
              <span data-i18n="celsiusSymbol">°C</span>
              <label class="switch">
                <input type="checkbox" id="temp-toggle" />
                <span class="slider round"></span>
              </label>
              <span data-i18n="fahrenheitSymbol" id="display-unit">°F</span>
            </div>

            <div class="lang-selector">
                <select id="lang-select" aria-label="Select language">
                    <option value="ro">Română</option>
                    <option value="en">English</option>
                </select>
            </div>
          </div>

          <!-- Căutare cu autocomplete -->
          <div class="search-wrapper">
            <form action="" id="search-form" class="search-container">
              <input
                type="text"
                name="city"
                id="city-input"
                class="input"
                placeholder="Introduceți numele orașului"
                data-i18n-placeholder="enterCityName"
                autocomplete="off"
              />
              <button class="btn" type="submit">
                <i class="fas fa-search"></i>
              </button>
            </form>
            <ul id="autocomplete-dropdown" class="autocomplete-dropdown hidden" role="listbox"></ul>
          </div>
        </section>

        <!-- Loading Spinner -->
        <div id="loading-spinner" class="spinner hidden">
          <div class="bounce1"></div>
          <div class="bounce2"></div>
          <div class="bounce3"></div>
        </div>

        <!-- Error Message -->
        <div id="error-message" class="error-message hidden"></div>

        <!-- Weather Information -->
        <section id="weather-info" class="card weather-info hidden">
          <!-- Overlay animatie meteo -->
          <div id="weather-animation" class="weather-animation" aria-hidden="true"></div>

          <div class="city-info">
            <h2 id="city-name"></h2>
            <p id="date-time"></p>
          </div>

          <div class="weather-main">
            <div class="temperature-container">
              <div class="temperature-main">
                <span id="temperature"></span>
                <span class="degree">&deg;</span>
              </div>
              <div class="feels-like">
                <span data-i18n="feelsLike">Se simte ca: </span>
                <span id="feels-like"></span>
                <span class="degree">&deg;</span>
              </div>
            </div>

            <div class="weather-icon-container">
              <img id="weather-icon" src="#" alt="Iconiță meteo" data-i18n-alt="weatherIconAlt"/>
              <p id="description"></p>
            </div>
          </div>

          <div class="weather-details data-panel">
            <div class="data-row">
              <i class="fas fa-tint data-icon"></i>
              <span class="data-label" data-i18n="humidity">Umiditate</span>
              <div class="data-value">
                <span id="humidity"></span>
                <span>%</span>
              </div>
            </div>
            <div class="data-row">
              <i class="fas fa-wind data-icon"></i>
              <span class="data-label" data-i18n="wind">Vânt</span>
              <div class="data-value">
                <span id="wind-speed"></span>
                <span id="wind-unit-label" data-i18n="windUnit"> m/s</span>
              </div>
            </div>
            <div class="data-row">
              <i class="fas fa-compress-alt data-icon"></i>
              <span class="data-label" data-i18n="pressure">Presiune</span>
              <div class="data-value">
                <span id="pressure"></span>
                <span data-i18n="pressureUnit"> hPa</span>
              </div>
            </div>
            <div class="data-row">
              <i class="fas fa-eye data-icon"></i>
              <span class="data-label" data-i18n="visibility">Vizibilitate</span>
              <div class="data-value">
                <span id="visibility"></span>
                <span data-i18n="visibilityUnit"> km</span>
              </div>
            </div>
          </div>

          <div class="sun-times data-panel">
            <div class="data-row">
              <i class="fas fa-sun data-icon"></i>
              <span class="data-label" data-i18n="sunrise">Răsărit</span>
              <span id="sunrise" class="data-value"></span>
            </div>
            <div class="data-row">
              <i class="fas fa-moon data-icon"></i>
              <span class="data-label" data-i18n="sunset">Apus</span>
              <span id="sunset" class="data-value"></span>
            </div>
          </div>

          <!-- Temperature Range Visualization -->
          <div class="temperature-visualization">
            <div id="temp-range" class="temp-range">
              <div id="temp-min" class="temp-min"></div>
              <div id="temp-indicator" class="temp-indicator">
                <span id="temp-current-label" class="temp-current-label"></span>
              </div>
              <div id="temp-max" class="temp-max"></div>
            </div>
          </div>

          <!-- Share Button -->
          <div class="share-section">
            <button id="share-btn" class="btn btn-share">
              <i class="fas fa-share-alt"></i>
              <span data-i18n="share">Distribuie</span>
            </button>
          </div>
        </section>

        <!-- Forecast Section -->
        <section id="forecast-section" class="card forecast-section hidden">
          <div class="forecast-tabs">
            <button class="forecast-tab active" data-tab="daily">
              <i class="fas fa-calendar-week"></i>
              <span data-i18n="daily">5 Zile</span>
            </button>
            <button class="forecast-tab" data-tab="hourly">
              <i class="fas fa-clock"></i>
              <span data-i18n="hourly">Orar</span>
            </button>
          </div>
          <div id="daily-forecast" class="forecast-container"></div>
          <div id="hourly-forecast" class="forecast-container hidden"></div>
        </section>

        <!-- Recent Searches -->
        <section id="recent-searches" class="card recent-searches hidden">
          <div class="recent-searches-header">
            <h3 data-i18n="recentSearchesTitle">Căutări Recente</h3>
            <button id="clear-searches" class="btn-clear" title="Șterge tot">
              <i class="fas fa-trash-alt"></i>
            </button>
          </div>
          <ul id="recent-list" class="tag-list"></ul>
        </section>
      </main>

      <footer class="app-footer">
        <p>
          <span data-i18n="dataProvidedBy">Date furnizate de</span>
          <a href="https://openweathermap.org/" target="_blank"
            >OpenWeatherMap</a
          >
        </p>
      </footer>
    </div>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {
            // Service worker registration failed silently
          });
        });
      }
    </script>
  </body>
</html>
