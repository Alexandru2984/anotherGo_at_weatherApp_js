<!DOCTYPE html>
<html lang="ro">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#212121" />
    <link rel="icon" href="/icons/icon.svg" type="image/svg+xml" />
    <title>Vremea — offline</title>
    <link rel="stylesheet" href="styles/styles.css" />
    <style>
      .offline-shell {
        max-width: 480px;
        margin: 12vh auto 0;
        text-align: center;
        display: grid;
        gap: 14px;
        justify-items: center;
      }
      .offline-shell img { width: 96px; height: 96px; }
      .offline-shell h1 { margin: 0; }
      .offline-shell .btn { text-decoration: none; }
    </style>
  </head>
  <body>
    <div class="container">
      <main>
        <section class="card offline-shell">
          <img src="/icons/icon.svg" alt="Vremea" width="96" height="96" />
          <h1>Ești offline</h1>
          <p>
            Nu există conexiune la internet. Revino când ești online pentru date
            meteo actualizate.
          </p>
          <a class="btn" href="/">Reîncearcă</a>
        </section>
      </main>
    </div>
  </body>
</html>
